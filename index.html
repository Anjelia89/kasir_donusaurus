<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
:root{
  --bg:#fff7ed;
  --bg-soft:#fff1df;
  --panel:#fffaf4;
  --panel-strong:#ffffff;
  --ink:#28170d;
  --muted:#806a58;
  --line:#efd8bd;
  --brand:#f97316;
  --brand-dark:#c84f0a;
  --accent:#0f766e;
  --accent-soft:#e4f5f1;
  --danger:#b42318;
  --danger-soft:#fff0eb;
  --shadow:0 14px 34px rgba(152,81,18,.11);
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:"Plus Jakarta Sans", Arial, sans-serif;
  font-size:14px;
  line-height:1.4;
  background:
    radial-gradient(circle at top left, rgba(249,115,22,.16), transparent 30%),
    linear-gradient(180deg,#fffaf4 0%,var(--bg) 44%,#fff 100%);
  color:var(--ink);
}
button,input,select,textarea{font:inherit}
button{border:0;cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.68}
.app{
  max-width:1180px;
  margin:0 auto;
  padding:16px;
}
.topbar{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:12px;
  margin-bottom:16px;
}
.menu-button{
  width:40px;
  height:40px;
  display:grid;
  place-items:center;
  border-radius:8px;
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
}
.menu-button span{
  width:18px;
  height:2px;
  display:block;
  background:var(--ink);
  margin:2px 0;
  border-radius:999px;
}
.brand h1{
  margin:0;
  font-size:22px;
  line-height:1.15;
  font-weight:800;
}
.brand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:12px;
  font-weight:600;
}
.status-pill{
  background:var(--accent-soft);
  color:var(--accent);
  padding:8px 11px;
  border-radius:999px;
  font-weight:800;
  font-size:12px;
  white-space:nowrap;
}
