<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS</title>

<style>
body{
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
  color:#111;
}
.box{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
button{
  margin:5px;
  padding:6px 10px;
  cursor:pointer;
}
input, select{
  margin:4px 0;
}
</style>
</head>

<body>

<h2>Donusaurus POS</h2>

<div class="box">
Customer:
<input type="text" id="nama" placeholder="Nama customer"><br><br>

Sumber:
<select id="sumber" onchange="autoMetode()">
  <option value="Walk-in">Walk-in</option>
  <option value="GoFood">GoFood</option>
  <option value="GrabFood">GrabFood</option>
  <option value="ShopeeFood">ShopeeFood</option>
  <option value="DM">DM</option>
</select><br><br>

Metode:
<select id="metode">
  <option>Cash</option>
  <option>QRIS</option>
  <option>Transfer</option>
  <option>Non-Cash (Platform)</option>
</select>
</div>

<div class="box">
<h3>Pilih Tipe</h3>
<select id="tipe" onchange="renderRasa()">
  <option value="pcs">PCS</option>
  <option value="box">BOX</option>
</select>

Jumlah:
<input type="number" id="qty" value="1" min="1" onchange="renderRasa()" oninput="renderRasa()">
</div>

<div class="box">
<h3>Pilih Rasa</h3>
<div id="rasaList"></div>
<p id="info"></p>
<button onclick="addToCart()">+ Tambah</button>
</div>

<div class="box">
<h3>Keranjang</h3>
<div id="cart"></div>
<h3>Total: Rp<span id="total">0</span></h3>
<br>
<button onclick="checkout()">Bayar</button>
</div>

<div id="afterCheckout"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";
const STRUK_URL = "https://donusaurus.github.io/struk_donusaurus/";

const menu = [
  "Abon","Blueberry","Caramel","Ceres Jadul","Cheese",
  "Choco Ceres","Choco Cookies","Choco Crunch","Choco Peanut",
  "Creme Brule","Gula Halus","Lotus Biscoff","Matcha Crunch",
  "Oreo","Original Glaze","Pistachio","Red Velvet","Srikaya",
  "Strawberry Sprinkle","Tiramisu Almond"
];

let pilihan = {};
let cart = [];

menu.forEach(r => pilihan[r] = 0);
window.addEventListener("load", renderRasa);

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, ""));
}

function rp(n){
  return toNumber(n).toLocaleString("id-ID");
}

function orderNo(n){
  return String(n || "").replace(/[^\d]/g, "").padStart(3, "0");
}

function renderRasa(){
  let html = "";

  menu.forEach(r => {
    html += `
      ${r}
      <button onclick="add('${r}')">+</button>
      ${pilihan[r]}
      <button onclick="minus('${r}')">-</button><br>
    `;
  });

  document.getElementById("rasaList").innerHTML = html;
  updateInfo();
}

function getConfig(){
  let tipe = document.getElementById("tipe").value;
  let qty = parseInt(document.getElementById("qty").value) || 1;

  if(qty < 1){
    qty = 1;
    document.getElementById("qty").value = 1;
  }

  let totalPcs = 0;
  let harga = 0;

  if(tipe === "pcs"){
    totalPcs = qty;
    harga = 8000 * qty;
  }

  if(tipe === "box"){
    totalPcs = qty * 6;
    harga = qty === 1 ? 45000 : 42500 * qty;
  }

  return { tipe, qty, totalPcs, harga };
}

function add(r){
  if(totalDipilih() < getConfig().totalPcs){
    pilihan[r]++;
    renderRasa();
  }
}

function minus(r){
  if(pilihan[r] > 0){
    pilihan[r]--;
    renderRasa();
  }
}

function totalDipilih(){
  return Object.values(pilihan).reduce((a,b) => a + b, 0);
}

function updateInfo(){
  let max = getConfig().totalPcs;
  let total = totalDipilih();
  document.getElementById("info").innerText = `Dipilih ${total}/${max} | Sisa ${max - total}`;
}

function addToCart(){
  let cfg = getConfig();

  if(totalDipilih() !== cfg.totalPcs){
    alert("Jumlah rasa belum sesuai!");
    return;
  }

  let rasaDipilih = [];

  for(let r in pilihan){
    if(pilihan[r] > 0){
      rasaDipilih.push(r + " (" + pilihan[r] + "x)");
    }
  }

  let label = cfg.tipe === "pcs"
    ? cfg.qty + "x Pcs Donat"
    : cfg.qty + "x Box Donat (6 pcs)";

  cart.push({
    item: label,
    rasa: rasaDipilih.join(", "),
    price: cfg.harga
  });

  menu.forEach(r => pilihan[r] = 0);

  renderRasa();
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price;
    html += `
      ${c.item} | Rp${rp(c.price)}
      <button onclick="removeCart(${i})">Hapus</button><br>
      ${c.rasa}<br><br>
    `;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = rp(total);
}

function removeCart(i){
  cart.splice(i, 1);
  renderCart();
}

function autoMetode(){
  let s = document.getElementById("sumber").value;

  if(["GoFood","GrabFood","ShopeeFood"].includes(s)){
    document.getElementById("metode").value = "Non-Cash (Platform)";
  }else{
    document.getElementById("metode").value = "Cash";
  }
}

async function checkout(){
  if(cart.length === 0){
    alert("Keranjang masih kosong!");
    return;
  }

  let total = cart.reduce((s,c) => s + c.price, 0);

  let payload = {
    nama: document.getElementById("nama").value || "-",
    sumber: document.getElementById("sumber").value,
    item: cart.map(c => c.item).join(" | "),
    detailRasa: cart.map(c => c.rasa).join(" | "),
    addOn: "-",
    harga: cart.map(c => c.price).join(" | "),
    total: total,
    metode: document.getElementById("metode").value
  };

  try{
    let res = await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    let data = await res.json();

    if(data.status === "success"){
      let link = STRUK_URL + "?id=" + data.fullID;

      document.getElementById("afterCheckout").innerHTML = `
        <div class="box">
          <h3>Order Berhasil!</h3>
          <p>Order ID: #${orderNo(data.orderID)} / ${data.kodeUnik}</p>
          <button onclick="window.open('${link}', '_blank')">Lihat Struk</button>
          <button onclick="navigator.clipboard.writeText('${link}')">Copy Link</button>
          <br><br>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(link)}">
        </div>
      `;

      cart = [];
      renderCart();

    }else{
      alert("Gagal checkout: " + (data.message || "Unknown error"));
    }

  }catch(err){
    alert("Koneksi gagal: " + err.message);
  }
}
</script>

</body>
</html>
