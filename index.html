<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS 🦖</title>

<style>
body{
  font-family:Arial;
  background:#f5f5f5;
  padding:20px;
}

.box{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>🦖 Donusaurus POS</h2>

<div class="box">

Customer:
<input type="text" id="nama" placeholder="Nama customer">

<br><br>

Sumber:
<select id="sumber" onchange="autoMetode()">
<option value="Walk-in">Walk-in</option>
<option value="GoFood">GoFood</option>
<option value="GrabFood">GrabFood</option>
<option value="ShopeeFood">ShopeeFood</option>
<option value="DM">DM</option>
</select>

<br><br>

Metode:
<select id="metode">
<option>Cash</option>
<option>QRIS</option>
<option>Transfer</option>
<option>Non-Cash (Platform)</option>
</select>

</div>

<div class="box">
<button onclick="checkout()">Bayar</button>
<button onclick="printNota()">Print</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

let lastData=null;
let lastPayload=null;

// =====================
// AUTO METODE
// =====================
function autoMetode(){
let sumber=document.getElementById("sumber").value;

if(sumber==="GoFood" || sumber==="GrabFood" || sumber==="ShopeeFood"){
document.getElementById("metode").value="Non-Cash (Platform)";
}else{
document.getElementById("metode").value="Cash";
}
}

// =====================
// CHECKOUT
// =====================
async function checkout(){

let nama=document.getElementById("nama").value || "-";
let sumber=document.getElementById("sumber").value;
let metode=document.getElementById("metode").value;

// format customer
let customer = nama + " (" + sumber + ")";

let payload={
item:"1x Box Donat (6 pcs)",
detailRasa:"Choco Peanut (2x), Gula Halus (2x), Creme Brule (2x)",
harga:"45000",
total:45000,
metode:metode,
customer:customer
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.status==="success"){
lastData=data;
lastPayload=payload;
alert("Order berhasil!");
}

}

// =====================
// PRINT STRUK
// =====================
function printNota(){

if(!lastData){
alert("Belum ada transaksi!");
return;
}

// 🔥 QR KE WEBSITE SENDIRI
let baseURL = window.location.origin + window.location.pathname;
let linkStruk = baseURL + "?id=" + lastData.orderID;

let qrURL = "https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=" + 
encodeURIComponent(linkStruk);

let win=window.open("","","width=300,height=700");

win.document.write(`
<html>
<head>
<style>
body{
font-family:monospace;
font-size:12px;
text-align:center;
}
.line{
border-top:1px dashed black;
margin:6px 0;
}
</style>
</head>

<body>

Donusaurus<br>
Cabang Sungai Jawi<br><br>

<div class="line"></div>

Order ID : #${lastData.orderID}<br>
Customer : ${lastPayload.customer}<br><br>

<div class="line"></div>

${lastPayload.item}<br>
${lastPayload.detailRasa}<br>

<div class="line"></div>

Total : Rp${lastPayload.total}<br>
Metode : ${lastPayload.metode}<br>

<div class="line"></div>

Thank you<br>
@donusaurus<br><br>

<img src="${qrURL}" width="70">

<script>
window.onload=function(){
setTimeout(function(){
window.print();
},500);
}
<\/script>

</body>
</html>
`);

win.document.close();
}

// =====================
// VIEW STRUK DARI QR
// =====================
function getParam(name){
let url=new URL(window.location.href);
return url.searchParams.get(name);
}

window.onload=async function(){

let id=getParam("id");

if(id){

let res=await fetch(API_URL+"?id="+id);
let data=await res.json();

if(data.error){
document.body.innerHTML="Struk tidak ditemukan";
return;
}

function rp(n){return Number(n).toLocaleString("id-ID");}

document.body.innerHTML=`
<div style="font-family:monospace;padding:20px;max-width:300px;margin:auto;">

<div style="text-align:center;">
Donusaurus<br>
Cabang Sungai Jawi<br>
</div>

<hr>

Order ID : #${data.orderID}<br>

<hr>

${data.item}<br>
${data.rasa}<br>

<hr>

Total : Rp${rp(data.total)}<br>
Metode : ${data.metode}

<hr>

<div style="text-align:center;">
Thank you<br>
@donusaurus
</div>

</div>
`;
}

}

</script>

</body>
</html>
