<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS 🦖</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px;}
.box{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
button{margin:3px;padding:6px 10px;}
</style>
</head>

<body>

<h2>🦖 Donusaurus POS</h2>

<div class="box">
<h3>Pilih Tipe</h3>

<select id="tipe">
<option value="pcs">PCS</option>
<option value="box">BOX</option>
</select>

Jumlah:
<input type="number" id="qty" value="1" min="1">

</div>

<div class="box">
<h3>Pilih Rasa</h3>
<div id="rasaList"></div>
<p id="info"></p>
<button onclick="addToCart()">+ Tambah</button>
</div>

<div class="box">
<h3>Keranjang</h3>
<div id="cart"></div>

<h3>Total: Rp<span id="total">0</span></h3>

<select id="metode">
<option>Cash</option>
<option>QRIS</option>
</select>

<br><br>
<button onclick="checkout()">💰 Bayar</button>
<button onclick="printNota()">🖨️ Print</button>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

const menu = [
"Abon","Blueberry","Caramel","Ceres Jadul","Cheese",
"Choco Ceres","Choco Cookies","Choco Crunch","Choco Peanut",
"Creme Brule","Gula Halus","Lotus Biscoff","Matcha Crunch",
"Oreo","Original Glaze","Pistachio","Red Velvet","Srikaya",
"Strawberry Sprinkle","Tiramisu Almond"
];

let pilihan = {};
let cart = [];
let lastData = null;
let lastPayload = null;

menu.forEach(r=>pilihan[r]=0);

function renderRasa(){
let html="";
menu.forEach(r=>{
html+=`
${r}
<button onclick="add('${r}')">+</button>
${pilihan[r]}
<button onclick="minus('${r}')">-</button><br>`;
});
document.getElementById("rasaList").innerHTML=html;
updateInfo();
}

function getConfig(){
let tipe = document.getElementById("tipe").value;
let qty = parseInt(document.getElementById("qty").value);

let totalPcs = 0;
let harga = 0;

if(tipe==="pcs"){
  totalPcs = qty;
  harga = 8000 * qty;
}

if(tipe==="box"){
  totalPcs = qty * 6;
  if(qty==1) harga = 45000;
  else harga = 42500 * qty;
}

return {tipe, qty, totalPcs, harga};
}

function add(r){
if(totalDipilih()<getConfig().totalPcs){
pilihan[r]++;
renderRasa();
}
}

function minus(r){
if(pilihan[r]>0){
pilihan[r]--;
renderRasa();
}
}

function totalDipilih(){
return Object.values(pilihan).reduce((a,b)=>a+b,0);
}

function updateInfo(){
let max=getConfig().totalPcs;
let total=totalDipilih();
document.getElementById("info").innerText =
`Dipilih ${total}/${max} | Sisa ${max-total}`;
}

function addToCart(){

let cfg = getConfig();

if(totalDipilih()!==cfg.totalPcs){
alert("Jumlah rasa belum sesuai!");
return;
}

let rasaDipilih=[];
for(let r in pilihan){
if(pilihan[r]>0){
rasaDipilih.push(r+" ("+pilihan[r]+"x)");
}
}

let label = cfg.tipe==="pcs"
  ? cfg.qty+" pcs"
  : cfg.qty+"x Donat (6 pcs)";

cart.push({
item: label,
rasa: rasaDipilih.join(", "),
price: cfg.harga
});

menu.forEach(r=>pilihan[r]=0);
renderRasa();
renderCart();
}

function renderCart(){
let html="";
let total=0;

cart.forEach((c,i)=>{
total+=c.price;
html+=`${c.item} | Rp${c.price}
<button onclick="hapus(${i})">❌</button><br>${c.rasa}<br><br>`;
});

document.getElementById("cart").innerHTML=html;
document.getElementById("total").innerText=total;
}

function hapus(i){
cart.splice(i,1);
renderCart();
}

async function checkout(){

if(cart.length===0){
alert("Keranjang kosong!");
return;
}

let metode=document.getElementById("metode").value;
let total=cart.reduce((s,c)=>s+c.price,0);

let payload={
item:cart.map(c=>c.item).join(" | "),
detailRasa:cart.map(c=>c.rasa).join(" | "),
harga:cart.map(c=>c.price).join(" | "),
total:total,
metode:metode
};

let res=await fetch(API_URL,{
method:"POST",
body:JSON.stringify(payload)
});

let data=await res.json();

if(data.status==="success"){
lastData=data;
lastPayload=payload;
alert("Order berhasil!");
}

cart=[];
renderCart();
}

function printNota(){
if(!lastData){
alert("Belum ada transaksi!");
return;
}

let items = lastPayload.item.split(" | ");
let harga = lastPayload.harga.split(" | ").map(x=>parseInt(x));

function rp(n){return n.toLocaleString("id-ID");}

let itemLines="";

items.forEach((it,i)=>{

let h=harga[i];

itemLines+=`
<div class="row">
  <span>${it}</span>
  <span>${rp(h)}</span>
  <span>${rp(h)}</span>
</div>
`;

let rasaList = lastPayload.detailRasa.split(" | ")[i] || "";

rasaList.split(", ").forEach(r=>{
itemLines+=`<div class="sub">- ${r}</div>`;
});

itemLines+=`<br>`;
});

let qrURL = `https://chart.googleapis.com/chart?chs=120x120&cht=qr&chl=${encodeURIComponent("Order:"+lastData.orderID)}`;

let win = window.open("", "", "width=300,height=700");

win.document.write(`
<html>
<head>
<style>
body{
font-family: monospace;
width:220px;
padding:10px;
font-size:12px;
line-height:1.6;
}
.center{text-align:center;}
.row{display:grid;grid-template-columns:1fr auto auto;}
.sub{padding-left:10px;}
hr{border-top:1px dashed black;margin:8px 0;}
</style>
</head>

<body>

<div class="center">
<img src="https://i.imgur.com/MubvKvS.png" width="35"><br>
Donusaurus<br>
Cabang Sungai Jawi<br>
Jln. H Rais A Rahman No.171B
</div>

<hr>

Order ID : #${lastData.orderID} / ${lastData.kodeUnik}<br>
Tanggal  : ${new Date().toLocaleString("id-ID")}

<hr>

<div class="row">
<b>Item</b><b>Harga</b><b>Subtotal</b>
</div>

<hr>

${itemLines}

<hr>

<div class="row">
<span>Total</span><span></span><span>Rp${rp(lastPayload.total)}</span>
</div>

<div class="row">
<span>Metode</span><span></span><span>${lastPayload.metode}</span>
</div>

<hr>

<div class="center">-------- Thankyou --------</div>

<div class="center">
<img src="${qrURL}" width="100">
</div>

<script>
window.print();
window.close();
<\/script>

</body>
</html>
`);

win.document.close();
}

renderRasa();

</script>

</body>
</html>
