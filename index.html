<!DOCTYPE html>
<html>
<head>
  <title>Donusaurus POS 🦖</title>
</head>

<body>

<h2>🍩 Donusaurus POS</h2>

<button onclick="addItem('Donat (1 pcs)', 8000)">Tambah Donat 1pcs</button>
<button onclick="addItem('Donat Box (6 pcs)', 45000)">Tambah Box</button>

<h3>Keranjang</h3>
<div id="cart"></div>

<h3>Total: Rp<span id="total">0</span></h3>

<select id="metode">
  <option>Cash</option>
  <option>QRIS</option>
</select>

<br><br>

<button onclick="checkout()">💰 Bayar</button>
<button onclick="printNota()">🖨️ Print Struk</button>

<div id="struk" style="display:none;"></div>

<script>

const API_URL = "PASTE_WEBAPP_URL_KAMU";

let cart = [];
let lastData = null;
let lastPayload = null;

function addItem(nama, harga){
  cart.push({
    item: "1x " + nama,
    rasa: "-",
    price: harga
  });
  renderCart();
}

function renderCart(){
  let html = "";
  let total = 0;

  cart.forEach((c,i)=>{
    total += c.price;
    html += `<div>${c.item} - Rp${formatRupiah(c.price)}</div>`;
  });

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = total;
}

async function checkout(){

  if(cart.length === 0){
    alert("Keranjang kosong!");
    return;
  }

  let metode = document.getElementById("metode").value;
  let total = cart.reduce((s,c)=>s+c.price,0);

  let payload = {
    item: cart.map(c => c.item).join(" | "),
    detailRasa: cart.map(c => c.rasa).join(" | "),
    harga: cart.map(c => c.price).join(" | "), // ✅ WAJIB
    total: total,
    metode: metode
  };

  let res = await fetch(API_URL, {
    method:"POST",
    body: JSON.stringify(payload)
  });

  let data = await res.json();

  if(data.status === "success"){

    alert("Order berhasil!\n#" + data.orderID + " / " + data.kodeUnik);

    // buka PDF
    window.open(data.invoice, "_blank");

    // simpan buat print
    lastData = data;
    lastPayload = payload;

  } else {
    alert("Struk gagal dibuat!");
  }

  cart = [];
  renderCart();
}

function printNota(){

  if(!lastData){
    alert("Belum ada transaksi!");
    return;
  }

  printStruk(lastData, lastPayload);
}

function printStruk(data, payload){

  let struk = document.getElementById("struk");

  struk.innerHTML = `
  <div style="
    width:220px;
    font-family:'Courier New', monospace;
    font-size:12px;
    line-height:1.7;
  ">

    <div style="text-align:center; margin-bottom:10px;">
      <img src="https://i.imgur.com/MubvKvS.png" style="width:45px;"><br>
      Donusaurus<br>
      Cabang Sungai Jawi<br>
      Jln. H Rais A Rahman No.171B
    </div>

    <hr>

    Order ID : #${data.orderID} / ${data.kodeUnik}<br>
    Tanggal  : ${formatTanggal()}

    <hr>

    ${formatItems(payload)}

    <hr>

    <div style="display:flex; justify-content:space-between;">
      <span>Total</span>
      <span>Rp${formatRupiah(payload.total)}</span>
    </div>

    <div style="display:flex; justify-content:space-between;">
      <span>Metode</span>
      <span>${payload.metode}</span>
    </div>

    <hr>

    <div style="text-align:center;">
      -------- Thankyou --------
    </div>

  </div>
  `;

  struk.style.display = "block";
  window.print();
  struk.style.display = "none";
}

function formatTanggal(){
  let d = new Date();
  return d.toLocaleDateString("id-ID") + ", " +
         d.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"});
}

function formatRupiah(a){
  return a.toLocaleString("id-ID");
}

function formatItems(p){

  let items = p.item.split(" | ");
  let harga = p.harga.split(" | ");

  let out = "";

  items.forEach((it,i)=>{

    let qty = parseInt(it.match(/\d+/)) || 1;
    let h = parseInt(harga[i]);
    let sub = qty * h;

    out += `
    <div style="display:flex; justify-content:space-between;">
      <span>${it}</span>
      <span>${formatRupiah(h)} ${formatRupiah(sub)}</span>
    </div><br>
    `;
  });

  return out;
}

</script>

</body>
</html>
