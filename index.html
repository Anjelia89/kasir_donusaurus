
<!DOCTYPE html>
<html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donusaurus POS</title>

<style>
:root{
  --bg:#f6f4ef;
  --panel:#fffdfa;
  --ink:#1f1b16;
  --muted:#766f66;
  --line:#e6ded2;
  --brand:#2f7d4a;
  --brand-dark:#1f6539;
  --accent:#f2b84b;
  --danger:#b33a2f;
  --shadow:0 12px 30px rgba(48,35,19,.08);
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#f5f5f5;
  padding:20px;
  color:#111;
  background:var(--bg);
  color:var(--ink);
}
.box{
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;

button,
input,
select{
  font:inherit;
}

button{
  margin:5px;
  padding:6px 10px;
  border:0;
  cursor:pointer;
}
input, select{
  margin:4px 0;

.app{
  max-width:1180px;
  margin:0 auto;
  padding:18px;
}

.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
}

.brand h1{
  margin:0;
  font-size:26px;
  line-height:1.1;
}

.brand p{
  margin:4px 0 0;
  color:var(--muted);
  font-size:13px;
}

.status-pill{
  background:#e8f4ec;
  color:var(--brand-dark);
  padding:9px 12px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
  white-space:nowrap;
}

.layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 360px;
  gap:16px;
  align-items:start;
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:16px;
}

.panel-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:14px;
}

.panel-title h2{
  margin:0;
  font-size:17px;
}

.hint{
  color:var(--muted);
  font-size:13px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:12px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.field label{
  color:var(--muted);
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
}

.field input,
.field select{
  width:100%;
  min-height:42px;
  border:1px solid var(--line);
  border-radius:8px;
  background:white;
  color:var(--ink);
  padding:9px 10px;
  outline:none;
}

.field input:focus,
.field select:focus{
  border-color:var(--brand);
  box-shadow:0 0 0 3px rgba(47,125,74,.14);
}

.order-grid{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:12px;
}

.summary-strip{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-top:14px;
}

.summary-cell{
  background:#f8f1e7;
  border:1px solid #ecdfcf;
  border-radius:8px;
  padding:10px;
}

.summary-cell small{
  display:block;
  color:var(--muted);
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
}

.summary-cell b{
  display:block;
  margin-top:4px;
  font-size:17px;
}

.progress{
  height:9px;
  background:#ece4d8;
  border-radius:999px;
  overflow:hidden;
  margin-top:12px;
}

.progress span{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--brand),var(--accent));
  transition:width .15s ease;
}

.flavor-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(210px,1fr));
  gap:10px;
}

.flavor-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:10px;
  align-items:center;
  min-height:54px;
  padding:10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:white;
}

.flavor-name{
  font-weight:700;
  line-height:1.25;
}

.stepper{
  display:grid;
  grid-template-columns:32px 28px 32px;
  align-items:center;
  gap:5px;
}

.stepper button{
  width:32px;
  height:32px;
  border-radius:8px;
  background:#f2ecdf;
  color:var(--ink);
  font-weight:800;
}

.stepper button:hover{
  background:#e6dccb;
}

.count{
  text-align:center;
  font-weight:800;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:14px;
}

.btn{
  min-height:42px;
  border-radius:8px;
  padding:10px 14px;
  font-weight:800;
  background:#efe7d9;
  color:var(--ink);
}

.btn-primary{
  background:var(--brand);
  color:white;
}

.btn-primary:hover{
  background:var(--brand-dark);
}

.btn-danger{
  background:#f8e4df;
  color:var(--danger);
}

.cart-panel{
  position:sticky;
  top:14px;
}

.cart-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  min-height:60px;
}

.empty-cart{
  border:1px dashed var(--line);
  border-radius:8px;
  color:var(--muted);
  padding:18px;
  text-align:center;
}

.cart-item{
  border:1px solid var(--line);
  border-radius:8px;
  background:white;
  padding:12px;
}

.cart-head{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}

.cart-head b{
  line-height:1.25;
}

.cart-price{
  white-space:nowrap;
  font-weight:800;
}

.cart-rasa{
  margin-top:8px;
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}

.cart-remove{
  margin-top:10px;
  background:transparent;
  color:var(--danger);
  padding:0;
  font-weight:800;
}

.total-box{
  border-top:1px solid var(--line);
  margin-top:14px;
  padding-top:14px;
}

.total-line{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.total-line span{
  color:var(--muted);
  font-weight:700;
}

.total-line b{
  font-size:25px;
}

.pay-btn{
  width:100%;
  margin-top:14px;
  min-height:48px;
  font-size:16px;
}

.success-box{
  background:#edf8f0;
  border:1px solid #cce8d3;
  border-color:#cce8d3;
  border-radius:8px;
  margin-top:16px;
  padding:14px;
}

.success-actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-top:12px;
}

.qr{
  display:block;
  width:140px;
  height:140px;
  margin-top:12px;
  border:8px solid white;
  border-radius:8px;
}

@media (max-width:900px){
  .layout{
    grid-template-columns:1fr;
  }

  .cart-panel{
    position:static;
  }

  .form-grid{
    grid-template-columns:1fr;
  }

  .order-grid{
    grid-template-columns:1fr 1fr;
  }
}

@media (max-width:560px){
  .app{
    padding:14px;
  }

  .topbar{
    align-items:flex-start;
    flex-direction:column;
  }

  .brand h1{
    font-size:24px;
  }

  .panel{
    padding:14px;
  }

  .summary-strip{
    grid-template-columns:1fr;
  }

  .flavor-grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<h2>Donusaurus POS</h2>
<main class="app">
  <header class="topbar">
    <div class="brand">
      <h1>Donusaurus POS</h1>

  <div class="layout">
    <section>
      <div class="panel">
        <div class="panel-title">
          <h2>Data Order</h2>

        <div class="form-grid">

      <div class="panel">

          </div>
        </div>

<div class="box">
Customer:
<input type="text" id="nama" placeholder="Nama customer"><br><br>
        <div class="progress">
          <span id="progressBar"></span>
        </div>
      </div>

Sumber:
<select id="sumber" onchange="autoMetode()">
  <option value="Walk-in">Walk-in</option>
  <option value="GoFood">GoFood</option>
  <option value="GrabFood">GrabFood</option>
  <option value="ShopeeFood">ShopeeFood</option>
  <option value="DM">DM</option>
</select><br><br>

        <div class="panel-title">
          <h2>Pilih Rasa</h2>
          <span class="hint" id="info">Dipilih 0/1</span>
        </div>

Metode:
<select id="metode">
  <option>Cash</option>
  <option>QRIS</option>
  <option>Transfer</option>
  <option>Non-Cash (Platform)</option>
</select>
</div>
        <div id="rasaList" class="flavor-grid"></div>

<div class="box">
<h3>Pilih Tipe</h3>
<select id="tipe" onchange="renderRasa()">
  <option value="pcs">PCS</option>
  <option value="box">BOX</option>
</select>
        <div class="actions">
          <button class="btn btn-primary" onclick="addToCart()">Tambah ke Keranjang</button>
          <button class="btn" onclick="resetPilihan()">Reset Rasa</button>

      </div>
    </section>

Jumlah:
<input type="number" id="qty" value="1" min="1" onchange="renderRasa()" oninput="renderRasa()">
</div>
    <aside class="panel cart-panel">
      <div class="panel-title">
        <h2>Keranjang</h2>
      </div>

<div class="box">
<h3>Pilih Rasa</h3>
<div id="rasaList"></div>
<p id="info"></p>
<button onclick="addToCart()">+ Tambah</button>
</div>
      <div id="cart" class="cart-list"></div>

<div class="box">
<h3>Keranjang</h3>
<div id="cart"></div>
<h3>Total: Rp<span id="total">0</span></h3>
<br>
<button onclick="checkout()">Bayar</button>
</div>
      <div class="total-box">
        <div class="total-line">
          <span>Total</span>
          <b>Rp<span id="total">0</span></b>
        </div>
        <button id="payBtn" class="btn btn-primary pay-btn" onclick="checkout()">Bayar</button>
      </div>

<div id="afterCheckout"></div>
      <div id="afterCheckout"></div>
    </aside>
  </div>
</main>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwCcACselUrqfBcaxrif7rVGjyJVjUGNc2N2XqSgyZMtqh8FM6Ta8iUVsz5BEDpXPzuow/exec";

let pilihan = {};
let cart = [];
let isCheckingOut = false;

menu.forEach(r => pilihan[r] = 0);
window.addEventListener("load", renderRasa);
window.addEventListener("load", function(){
  renderRasa();
  renderCart();
});

function toNumber(n){
  return Number(String(n || "0").replace(/[^\d]/g, ""));

  menu.forEach(r => {
    html += `
      ${r}
      <button onclick="add('${r}')">+</button>
      ${pilihan[r]}
      <button onclick="minus('${r}')">-</button><br>
      <div class="flavor-card">
        <div class="flavor-name">${r}</div>
        <div class="stepper">
          <button type="button" onclick="minus('${r}')">-</button>
          <div class="count">${pilihan[r]}</div>
          <button type="button" onclick="add('${r}')">+</button>
        </div>
      </div>
    `;
  });

  }
}

function resetPilihan(){
  menu.forEach(r => pilihan[r] = 0);
  renderRasa();
}

function totalDipilih(){
  return Object.values(pilihan).reduce((a,b) => a + b, 0);
}

function updateInfo(){
  let max = getConfig().totalPcs;
  let cfg = getConfig();
  let total = totalDipilih();
  document.getElementById("info").innerText = `Dipilih ${total}/${max} | Sisa ${max - total}`;
  let sisa = cfg.totalPcs - total;
  let progress = cfg.totalPcs > 0 ? Math.min(100, (total / cfg.totalPcs) * 100) : 0;

  document.getElementById("info").innerText = `Dipilih ${total}/${cfg.totalPcs} | Sisa ${sisa}`;
  document.getElementById("targetPcs").innerText = cfg.totalPcs;
  document.getElementById("pickedPcs").innerText = total;
  document.getElementById("previewHarga").innerText = rp(cfg.harga);
  document.getElementById("progressBar").style.width = progress + "%";
}

function addToCart(){
  });

  menu.forEach(r => pilihan[r] = 0);
  document.getElementById("afterCheckout").innerHTML = "";

  renderRasa();
  renderCart();
  let html = "";
  let total = 0;

  cart.forEach((c, i) => {
    total += c.price;
    html += `
      ${c.item} | Rp${rp(c.price)}
      <button onclick="removeCart(${i})">Hapus</button><br>
      ${c.rasa}<br><br>
    `;
  });
  if(cart.length === 0){
    html = `<div class="empty-cart">Belum ada item</div>`;
  }else{
    cart.forEach((c, i) => {
      total += c.price;
      html += `
        <div class="cart-item">
          <div class="cart-head">
            <b>${c.item}</b>
            <span class="cart-price">Rp${rp(c.price)}</span>
          </div>
          <div class="cart-rasa">${c.rasa}</div>
          <button class="cart-remove" onclick="removeCart(${i})">Hapus</button>
        </div>
      `;
    });
  }

  document.getElementById("cart").innerHTML = html;
  document.getElementById("total").innerText = rp(total);
}

async function checkout(){
  if(isCheckingOut) return;

  if(cart.length === 0){
    alert("Keranjang masih kosong!");
    return;
  }

  isCheckingOut = true;
  document.getElementById("payBtn").innerText = "Memproses...";
  document.getElementById("payBtn").disabled = true;

  let total = cart.reduce((s,c) => s + c.price, 0);

  let payload = {
      let link = STRUK_URL + "?id=" + data.fullID;

      document.getElementById("afterCheckout").innerHTML = `
        <div class="box">
          <h3>Order Berhasil!</h3>
          <p>Order ID: #${orderNo(data.orderID)} / ${data.kodeUnik}</p>
          <button onclick="window.open('${link}', '_blank')">Lihat Struk</button>
          <button onclick="navigator.clipboard.writeText('${link}')">Copy Link</button>
          <br><br>
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(link)}">
        <div class="success-box">
          <h2 style="font-size:17px;margin:0 0 6px">Order Berhasil</h2>
          <p style="margin:0;color:var(--muted)">Order ID: #${orderNo(data.orderID)} / ${data.kodeUnik}</p>
          <div class="success-actions">
            <button class="btn btn-primary" onclick="window.open('${link}', '_blank')">Lihat Struk</button>
            <button class="btn" onclick="navigator.clipboard.writeText('${link}')">Copy Link</button>
          </div>
          <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=${encodeURIComponent(link)}">
        </div>
      `;


  }catch(err){
    alert("Koneksi gagal: " + err.message);

  }finally{
    isCheckingOut = false;
    document.getElementById("payBtn").innerText = "Bayar";
    document.getElementById("payBtn").disabled = false;
  }
}
</script>
